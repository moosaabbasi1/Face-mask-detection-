{% extends 'detector/base.html' %}
{% block title %}Contact{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <div class="text-center mb-5">
      <h1 class="section-title">Contact Us</h1>
      <p class="section-subtitle">Have questions? We'd love to hear from you.</p>
    </div>
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="glass-card">
          <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
              <label class="form-label fw-semibold">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn-accent btn w-100">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
